<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>乡创智汇 · 返乡创业AI赋能平台</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: '宋体', 'SimSun', 'Times New Roman', serif;
            background-color: #F9F7F0;
            color: #2C3E2A;
            line-height: 1.45;
            overflow-x: hidden;
        }
        .welcome-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2000;
            background: linear-gradient(135deg, rgba(65, 88, 48, 0.55) 0%, rgba(110, 98, 70, 0.45) 100%),
                        url('https://images.pexels.com/photos/259683/pexels-photo-259683.jpeg?auto=compress&cs=tinysrgb&w=1600') center/cover no-repeat;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.8s cubic-bezier(0.2, 0.9, 0.4, 1.1), visibility 0.8s;
            opacity: 1;
            visibility: visible;
        }
        .welcome-screen.hide {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
        .welcome-card {
            background: rgba(253, 251, 240, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 64px;
            padding: 48px 56px;
            text-align: center;
            box-shadow: 0 30px 45px -20px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,250,225,0.6);
            max-width: 600px;
            width: 85%;
        }
        .welcome-card h1 {
            font-size: 3.2rem;
            font-weight: 500;
            color: #3A5C2E;
            letter-spacing: 2px;
            margin-bottom: 12px;
        }
        .welcome-card p {
            font-size: 1rem;
            color: #5A6E48;
            margin-bottom: 40px;
            border-top: 1px solid rgba(90,110,72,0.2);
            display: inline-block;
            padding-top: 12px;
        }
        .slider-btn {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: space-between;
            background: #5E7A4D;
            border-radius: 60px;
            padding: 0;
            cursor: pointer;
            width: 240px;
            transition: all 0.3s;
            box-shadow: 0 6px 14px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .slider-btn span {
            display: inline-block;
            padding: 14px 0 14px 28px;
            color: white;
            font-weight: 500;
            font-size: 1.1rem;
            letter-spacing: 1px;
        }
        .slider-btn .slide-icon {
            background: #F7E9C3;
            border-radius: 50%;
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #4A6739;
            font-size: 1.3rem;
            margin: 4px;
            transition: transform 0.4s ease;
        }
        .slider-btn:hover {
            background: #466639;
            transform: scale(1.02);
        }
        .slider-btn:hover .slide-icon {
            transform: translateX(6px);
        }
        .app-wrapper {
            display: flex;
            min-height: 100vh;
            position: relative;
        }
        .sidebar {
            width: 280px;
            background: #5E7A4D;
            color: #FDFBF5;
            position: sticky;
            top: 0;
            height: 100vh;
            overflow-y: auto;
            z-index: 100;
            transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            box-shadow: 4px 0 20px rgba(0, 0, 0, 0.05);
            display: flex;
            flex-direction: column;
        }
        .sidebar::-webkit-scrollbar { width: 4px; }
        .sidebar::-webkit-scrollbar-track { background: #4A6739; }
        .sidebar::-webkit-scrollbar-thumb { background: #C9DFB2; border-radius: 4px; }
        .logo-area {
            padding: 32px 24px 20px 24px;
            border-bottom: 1px solid rgba(255, 250, 235, 0.25);
            margin-bottom: 24px;
        }
        .logo-area h2 {
            font-size: 1.7rem;
            font-weight: 500;
            letter-spacing: 1px;
            color: #FEF5E3;
        }
        .logo-area p {
            font-size: 0.75rem;
            color: #E3E8D9;
            margin-top: 8px;
        }
        .nav-menu {
            flex: 1;
            padding: 0 16px 20px 16px;
        }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 14px;
            width: 100%;
            padding: 12px 18px;
            margin-bottom: 8px;
            background: transparent;
            border: none;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 500;
            font-family: '宋体', 'SimSun', serif;
            color: #FDF8EC;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: left;
        }
        .nav-item i { width: 24px; font-size: 1.2rem; }
        .nav-item:hover { background: rgba(255, 245, 220, 0.2); transform: translateX(2px); }
        .nav-item.active {
            background: #F7E9C3;
            color: #4A6739;
            box-shadow: 0 6px 12px -8px rgba(0,0,0,0.2);
        }
        .nav-item.active i { color: #4A6739; }
        .main-content {
            flex: 1;
            background: #FDFBF5;
            overflow-x: hidden;
        }
        .search-header {
            background: rgba(255, 253, 245, 0.96);
            backdrop-filter: blur(8px);
            padding: 18px 32px;
            border-bottom: 1px solid #EBE5D8;
            position: sticky;
            top: 0;
            z-index: 90;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }
        .menu-toggle {
            display: none;
            background: #EADFCB;
            border: none;
            font-size: 1.4rem;
            width: 44px;
            height: 44px;
            border-radius: 30px;
            color: #4A6739;
            cursor: pointer;
        }
        .search-engine-group {
            display: flex;
            gap: 6px;
            background: #F5F2EA;
            padding: 5px;
            border-radius: 60px;
        }
        .engine-btn {
            background: transparent;
            border: none;
            padding: 7px 22px;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            color: #5B6E4A;
        }
        .engine-btn.active {
            background: #5E7A4D;
            color: white;
        }
        .search-input-wrapper {
            flex: 2;
            min-width: 260px;
            display: flex;
            background: #FFFFFF;
            border: 1px solid #E4DDCF;
            border-radius: 60px;
            padding: 5px 8px 5px 22px;
        }
        .search-input-wrapper input {
            flex: 1;
            border: none;
            background: transparent;
            padding: 11px 0;
            font-size: 0.9rem;
            outline: none;
        }
        .search-input-wrapper button {
            background: #5E7A4D;
            border: none;
            color: white;
            padding: 8px 26px;
            border-radius: 50px;
            cursor: pointer;
        }
        .content-sections {
            padding: 28px 36px 60px 36px;
        }
        .section-block {
            scroll-margin-top: 90px;
            margin-bottom: 48px;
        }
        .block-title {
            font-size: 1.8rem;
            font-weight: 550;
            color: #3C5A33;
            border-left: 5px solid #C9DFB2;
            padding-left: 20px;
            margin-bottom: 24px;
        }
        .sub-feature-grid {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 24px;
            border-bottom: 1px solid #EAE3D4;
            padding-bottom: 12px;
        }
        .sub-btn {
            background: transparent;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 500;
            color: #5F7350;
            cursor: pointer;
        }
        .sub-btn.active {
            background: #E9F0E2;
            color: #3D6231;
        }
        .form-group { margin-bottom: 1rem; }
        .form-group label { font-weight: 500; font-size: 0.85rem; display: block; margin-bottom: 0.3rem; color: #3C5A33; }
        input, select, textarea {
            width: 100%;
            padding: 0.7rem 1rem;
            border-radius: 20px;
            border: 1px solid #DDEBD4;
            background: white;
            font-size: 0.9rem;
            font-family: inherit;
        }
        .row-2 { display: flex; gap: 1rem; flex-wrap: wrap; }
        .row-2 > * { flex: 1; }
        .btn-primary {
            background: #5A7D4A;
            color: white;
            border: none;
            padding: 0.8rem;
            border-radius: 40px;
            font-weight: 560;
            width: 100%;
            cursor: pointer;
            margin: 0.8rem 0 1rem;
        }
        .result-card {
            background: #FEFCF5;
            border-radius: 24px;
            padding: 1.2rem;
            margin-top: 1.2rem;
            border: 1px solid #EDF4E6;
        }
        .copy-tip, .platform-link, .search-result-item {
            background: #EDF4E8;
            border: none;
            padding: 0.25rem 1rem;
            border-radius: 30px;
            font-size: 0.7rem;
            cursor: pointer;
            margin-right: 8px;
            margin-top: 6px;
            display: inline-block;
            text-decoration: none;
            color: #2C5A2A;
        }
        .policy-item, .video-card {
            background: #FCFDF9;
            border-radius: 20px;
            padding: 1rem;
            margin-bottom: 1rem;
            border: 1px solid #EAF1E3;
        }
        .platform-buttons {
            display: flex;
            gap: 12px;
            margin: 16px 0;
            flex-wrap: wrap;
        }
        .platform-badge {
            background: #E9F0E2;
            border-radius: 40px;
            padding: 8px 18px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .platform-badge i { font-size: 1rem; }
        .platform-badge:hover { background: #D9E8CF; transform: translateY(-2px); }
        @media (max-width: 860px) {
            .sidebar { position: fixed; left: 0; top: 0; transform: translateX(-100%); z-index: 1000; }
            .sidebar.open { transform: translateX(0); }
            .menu-toggle { display: flex; align-items: center; justify-content: center; }
            .content-sections { padding: 20px; }
            .welcome-card h1 { font-size: 2.2rem; }
        }
        .overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(2px);
            z-index: 990;
        }
        .overlay.show { display: block; }
        html { scroll-behavior: smooth; }
        footer {
            text-align: center;
            font-size: 0.7rem;
            padding: 28px 0 20px;
            color: #B2C2A2;
            border-top: 1px solid #EDE7DB;
            margin-top: 20px;
        }
        .search-result-list {
            margin-top: 16px;
        }
        .search-result-item {
            display: block;
            background: white;
            margin-bottom: 12px;
            padding: 12px 16px;
            border-radius: 20px;
            border: 1px solid #E4DDCF;
            transition: 0.2s;
            cursor: pointer;
        }
        .search-result-item:hover {
            background: #F9F7EF;
            border-color: #C9DFB2;
            transform: translateX(4px);
        }
        .search-result-title {
            font-weight: 600;
            color: #3C5A33;
            margin-bottom: 4px;
        }
        .search-result-desc {
            font-size: 0.75rem;
            color: #6A7E5C;
        }
        .copy-tip {
            background: #EDF4E8;
            border: none;
            padding: 0.25rem 1rem;
            border-radius: 30px;
            font-size: 0.7rem;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="welcomeScreen" class="welcome-screen">
        <div class="welcome-card">
            <h1>乡创智汇</h1>
            <p>返乡创业AI赋能平台</p>
            <div class="slider-btn" id="welcomeSliderBtn">
                <span>欢迎访问</span>
                <div class="slide-icon"><i class="fas fa-arrow-right"></i></div>
            </div>
            <div style="margin-top: 28px; font-size: 0.7rem; opacity: 0.7;">乡村振兴 · 即学即用</div>
        </div>
    </div>

    <div class="app-wrapper" id="mainApp">
        <div id="overlay" class="overlay"></div>
        <aside class="sidebar" id="sidebar">
            <div class="logo-area">
                <h2>乡创智汇</h2>
                <p>返乡创业AI赋能平台</p>
            </div>
            <div class="nav-menu" id="navMenu"></div>
            <div style="padding: 20px 24px 32px; font-size:0.7rem;">© 助农兴产</div>
        </aside>
        <main class="main-content">
            <div class="search-header">
                <button class="menu-toggle" id="menuToggleBtn"><i class="fas fa-bars"></i></button>
                <div class="search-engine-group" id="engineGroup">
                    <button data-engine="baidu" class="engine-btn active">百度</button>
                    <button data-engine="google" class="engine-btn">Google</button>
                    <button data-engine="bing" class="engine-btn">必应</button>
                </div>
                <div class="search-input-wrapper">
                    <input type="text" id="searchInput" placeholder="搜索乡村政策、技术、案例..." value="乡村振兴 创业">
                    <button id="searchBtn"><i class="fas fa-search"></i> 搜索</button>
                </div>
            </div>
            <div class="content-sections" id="contentSections"></div>
            <footer>本平台致力于服务返乡创业青年 · AI赋能 即学即用</footer>
        </main>
    </div>

    <div id="payModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); align-items:center; justify-content:center; z-index:1100;">
        <div style="background:white; max-width:320px; width:90%; border-radius: 32px; padding: 24px; text-align:center;">
            <h3>开通会员</h3>
            <p>9.9元/月，解锁数字人直播 + 高级脚本 + 无限文案</p>
            <button id="confirmPayBtn" style="background:#5A7D4A; border:none; padding:12px; width:100%; border-radius:40px; color:white;">模拟支付</button>
            <button id="closePayModal" style="margin-top:12px; background:none; border:none;">暂不开通</button>
        </div>
    </div>
    <div id="toastMsg" style="position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:#2C4B2F; color:white; padding:6px 18px; border-radius:50px; font-size:0.8rem; opacity:0; transition:0.2s; pointer-events:none; z-index:1200;"></div>

    <script>
        // 欢迎页
        const welcomeScreen = document.getElementById('welcomeScreen');
        const welcomeSlider = document.getElementById('welcomeSliderBtn');
        if (welcomeSlider) {
            welcomeSlider.addEventListener('click', () => {
                welcomeScreen.classList.add('hide');
                setTimeout(() => { welcomeScreen.style.display = 'none'; }, 800);
                setTimeout(() => window.dispatchEvent(new Event('scroll')), 200);
            });
        }

        function showToast(msg) { const t = document.getElementById('toastMsg'); t.innerText = msg; t.style.opacity='1'; setTimeout(()=>t.style.opacity='0',2000); }
        function copyLink(url) { if(url) navigator.clipboard.writeText(url).then(()=>showToast('链接已复制')).catch(()=>showToast('复制失败')); }

        // 左侧导航
        const navItems = [
            { id: "ai", name: "AI智囊团", icon: "fas fa-robot" },
            { id: "policy", name: "政策直通车", icon: "fas fa-search" },
            { id: "school", name: "乡创学堂", icon: "fas fa-graduation-cap" }
        ];
        function renderSidebar() {
            const navMenu = document.getElementById('navMenu');
            navMenu.innerHTML = '';
            navItems.forEach(item => {
                const btn = document.createElement('button');
                btn.className = 'nav-item';
                btn.setAttribute('data-nav', item.id);
                btn.innerHTML = `<i class="${item.icon}"></i><span>${item.name}</span>`;
                btn.addEventListener('click', () => {
                    const target = document.getElementById(`section-${item.id}`);
                    if(target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    closeMobileSidebar();
                });
                navMenu.appendChild(btn);
            });
        }

        // ---------- 增强版文案生成：三条不同风格，每条约250-300字 ----------
        function generateDetailedCopy(product, category, selling, platform, style, index) {
            // 风格基础模板库
            const templates = {
                '亲切乡土风': [
                    (p, c, s, plat) => `【乡土叙事版】老张家的${p}熟了！在海拔800米的山坡上，每一颗${c}都晒足了280天的太阳。${s}。不打蜡，不催熟，从树上到您手里，就隔一个快递的距离。咬一口，满嘴都是小时候的味道——脆甜多汁，果香浓郁。咱们山里人不懂什么花哨营销，就知道把最好的果子留给最懂的人。今年风调雨顺，果子格外甜，但产量只有8000斤，卖完就收工。想尝尝真正高山种植的${p}，点击下方购物车，现摘现发，坏果包赔。新农人老张，感谢每一位支持乡村的朋友。#家乡特产 #新农人 #${c}`,
                    (p, c, s, plat) => `【乡村生活版】清晨五点半，露水还没散，我就背着竹篓上山了。这是我家的${p}果园，五十棵老树，每棵树只留200个果子。${s}。城里朋友总问我：你们的果子为啥特别甜？我笑着指指头顶的太阳和脚下的黄土——没啥秘诀，就是让果子自然长，不着急。摘下来的${c}，表皮还带着晨露，咬一口，汁水能溅到衣服上。这味道，城里的超市真买不到。今天现摘现发，泡沫箱加冰袋，顺丰包邮。想吃地道乡村味道的，点左下角链接，支持一下返乡创业的新农人。#乡村味道 #助农 #${p}`,
                    (p, c, s, plat) => `【朴实真诚版】乡亲们好，我是返乡种${c}的小周。咱家的${p}，${s}。没有冷库果，没有打蜡果，树上熟到什么程度摘什么程度。您收到货如果觉得不甜，不用废话，直接退款，果子白送。这不是套路，是新农人的底气。去年有个广东的客户，一次性买了20箱送亲戚，说这是他在城里吃不到的童年味道。今年咱们还做了升级，每一箱都放了一个测糖仪，您可以自己测，糖度低于16度算我输。{$plat}的朋友，信得过咱庄稼人的，拍一单尝尝，不好吃你回来骂我。#诚信助农 #源头直发 #${c}`
                ],
                '专业品质风': [
                    (p, c, s, plat) => `【品控严选版】【严选】${p} | 核心产区直供，${s}。每一颗${c}均经过糖度检测（≥18°）、农残检测（232项未检出）、果径筛选（70-80mm）。采用日本进口分选线，确保大小均匀，无碰伤。包装使用食品级珍珠棉+冰袋，48小时冷链直达。适合企业采购、高端礼品、家庭长期储备。可提供发票、检测报告、产地证明。支持一件代发，欢迎电商、社区团购、企事业单位洽谈合作。现摘现发，坏果包赔。点击购物车查看详情。#高端水果 #产地直供 #${c}`,
                    (p, c, s, plat) => `【数据实证版】【科学种植】${p} | 产自北纬30°黄金种植带，年平均日照1800小时，昼夜温差12℃以上，糖酸比完美。${s}。采用水肥一体化滴灌系统，物理防虫，施有机肥。经SGS检测，维生素C含量达68mg/100g，是普通苹果的3倍。每一箱都有溯源码，可查看种植、采摘、分拣全过程。已通过绿色食品认证。现摘现发，京东/顺丰包邮。企业采购10箱以上享9折，50箱以上享8折并赠送定制礼盒。欢迎私信索取样品。#品质农业 #可溯源 #${p}`,
                    (p, c, s, plat) => `【品牌化版】【品牌故事】${p}——来自“中国${c}之乡”的地理标志产品。我们的果园位于国家自然保护区缓冲带，土壤富含硒元素。${s}。三代果农传承，30年种植经验，坚持自然成熟、人工采摘、二次精选。每一箱${c}都附带一封手写的感谢信和种植日记。我们不仅仅卖水果，更是在传递一种尊重自然、敬畏土地的生活态度。企业定制可加印Logo、定制祝福语，是节日福利、客户伴手礼的绝佳选择。现面向全国诚招代理，零门槛，一件代发。详情请私信或点击下方链接。#地理标志产品 #乡村振兴品牌 #${p}`
                ],
                '年轻网感风': [

                    (p, c, s, plat) => `【短文案快节奏版】⚠️警告！这颗${p}甜度超标！！咬一口，糖度直冲18°+，就像在喝蜂蜜水。${s}。不打蜡，不催熟，树上熟。果园直发，没有中间商赚差价。坏果包赔，售后无忧。抖音/快手/视频号的朋友，今天下单还送一斤试吃装，不满意全额退款。真的，别去超市买那些冷库果了，尝尝刚从树上摘下来的新鲜味道。点购物车，冲！#新农人计划 #源头好货 #${c}`
                ]

            // 根据风格选择模板组，如果没有则默认亲切乡土风

        // 渲染主内容

                <div id="section-school" class="section-block">

                        <label>关键词搜索 (支持语音)</label>

                            <button id="voiceInputBtn" style="background:#EAF5E3; border-radius:60px; padding:0 20px;">语音输入</button>

                    <div class="platform-buttons">

                    </div>
                    <div id="videoResultArea" class="search-result-list"></div>
                </div>
            `;

            // AI子面板切换逻辑
            const subBtns = document.querySelectorAll('#aiSubTabs .sub-btn');
            const panels = { copy: document.getElementById('aiCopyPanel'), script: document.getElementById('aiScriptPanel'), avatar: document.getElementById('aiAvatarPanel') };
            subBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    subBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    const target = btn.getAttribute('data-sub');
                    Object.values(panels).forEach(p => p.style.display = 'none');
                    if(target === 'copy') panels.copy.style.display = 'block';

            // 文案生成：调用增强函数，生成三条不同风格/角度的文案，每条约300字
            const genBtn = document.getElementById('genCopyBtn');
            genBtn.addEventListener('click', () => {
                const product = document.getElementById('cpName').value.trim();

                for (let i = 0; i < 3; i++) {
                    copies.push(generateDetailedCopy(product, finalCat, finalSell, finalPlatform, finalStyle, i));
                }
                const container = document.getElementById('copyTextList');
                container.innerHTML = copies.map((txt, idx) => `
                    <div style="background:#F9FCF5; border-radius:20px; padding:1rem; margin-bottom:16px; border:1px solid #E0EFD6;">

                `).join('');
                document.getElementById('copyResultArea').style.display = 'block';
                document.querySelectorAll('[data-copy]').forEach(btn => {
                    btn.addEventListener('click', (e) => {

                        navigator.clipboard.writeText(text).then(() => showToast('文案已复制')).catch(() => showToast('复制失败'));

            // 脚本生成（保持不变）
            document.getElementById('genScriptBtn').addEventListener('click', () => {
                const product = document.getElementById('scProduct').value.trim() || '农产品';
                const selling = document.getElementById('scSelling').value.trim() || '新鲜美味';
                const scene = document.getElementById('scScene').value;
                const scenes = { '果园实拍':[['远景','果园全景','5s',`咱家${product}喝山泉水`],['特写','果实挂枝','7s',selling],['中景','掰开爆汁','8s','甜度高'],['近景','农户推荐','8s','点击下单']], '打包发货':[['中景','仓库打包','5s','当天现发'],['特写','封箱','6s','泡沫箱'],['近景','发货单','8s',`${selling} 放心买`],['全景','快递车','6s','马上出发']], '产品展示':[['特写','产品质感','6s',selling],['微距','细节','7s','品质保证'],['对比','对比普通','8s','没有对比'],['近景','推荐','7s','购物车已上架']], '人物讲述':[['近景','农户讲述','6s','返乡创业故事'],['中景','产地环境','8s',`${product}自然生长`],['特写','产品','7s','地道风味'],['近景','呼吁','7s','支持新农人']] };

                let plain = '';
                rows.forEach((r,i)=>{ html += `<tr><td>${i+1}</td><td>${r[0]}</td><td>${r[1]}</td><td>${r[2]}</td><td>${r[3]}</td></tr>`; plain += `${i+1}.${r[0]} ${r[1]} 口播:${r[3]}\n`; });
                html += `</tbody></table>`;
                document.getElementById('scriptTable').innerHTML = html;
                document.getElementById('scriptResultArea').style.display = 'block';
                window.scriptPlain = plain;

            document.getElementById('copyScriptText')?.addEventListener('click',()=>{ if(window.scriptPlain) navigator.clipboard.writeText(window.scriptPlain).then(()=>showToast('脚本已复制')); });
            
            // 会员弹窗
            document.getElementById('tryPremiumBtn')?.addEventListener('click',()=>document.getElementById('payModal').style.display='flex');

            // 视频搜索：平台搜索，先展示列表

                const platformName = { douyin: "抖音", bilibili: "B站", xiaohongshu: "小红书" }[platform] || platform;

                    { title: `${keyword} - 专家直播回放`, desc: `农业专家与短视频运营大咖联袂讲解`, url: platform === 'douyin' ? `https://www.douyin.com/search/${encodeURIComponent(keyword)}%20直播` : (platform === 'bilibili' ? `https://search.bilibili.com/all?keyword=${encodeURIComponent(keyword)}%20直播` : `https://www.xiaohongshu.com/search_result?keyword=${encodeURIComponent(keyword)}%20直播`) }
                ];
                videoResultArea.innerHTML = `<div style="font-weight:500; margin-bottom:12px;">在${platformName} 搜索“${keyword}”的结果：</div>` +
                    results.map(r => `<div class="search-result-item" data-url="${r.url}">
                        <div class="search-result-title">${r.title}</div>
                        <div class="search-result-desc">${r.desc}</div>

                    renderVideoList(kw, platform);

            // 语音输入：授权 + 语音转文字
            const voiceBtn = document.getElementById('voiceInputBtn');
            if (window.SpeechRecognition || window.webkitSpeechRecognition) {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                const recognition = new SpeechRecognition();
                recognition.continuous = false;
                recognition.lang = 'zh-CN';
                voiceBtn.addEventListener('click', async () => {
                    try {
                        await navigator.mediaDevices.getUserMedia({ audio: true });
                        recognition.start();
                        showToast('请说话...');
                        recognition.onresult = (e) => {
                            const text = e.results[0][0].transcript;
                            videoKeyword.value = text;
                            showToast('语音识别成功');
                        };
                        recognition.onerror = (err) => {
                            console.error(err);
                            showToast('语音识别失败，请检查麦克风权限');
                        };
                    } catch (err) {
                        showToast('无法获取麦克风权限，请手动允许');

            } else {
                voiceBtn.style.opacity = 0.6;
                voiceBtn.title = '浏览器不支持语音识别';
                voiceBtn.addEventListener('click', () => showToast('当前浏览器不支持语音输入'));
            }
        }

        // 滚动监听高亮左侧导航
        function initScrollSpy() {
            const sections = ['ai', 'policy', 'school'].map(id => document.getElementById(`section-${id}`)).filter(Boolean);
            const navBtns = document.querySelectorAll('.nav-item');
            function update() {
                let current = '';
                const scrollPos = window.scrollY + 100;
                for(let sec of sections) {
                    if(sec) {
                        const offsetTop = sec.offsetTop;
                        const offsetBottom = offsetTop + sec.offsetHeight;
                        if(scrollPos >= offsetTop && scrollPos < offsetBottom) { current = sec.id.replace('section-',''); break; }
                    }
                }
                if(!current && sections.length && (window.innerHeight+window.scrollY)>=document.body.scrollHeight-50) current='school';
                navBtns.forEach(btn => {
                    const navId = btn.getAttribute('data-nav');
                    if(navId === current) btn.classList.add('active');
                    else btn.classList.remove('active');
                });
            }
            window.addEventListener('scroll', () => requestAnimationFrame(update));
            update();
        }
        function closeMobileSidebar() { document.getElementById('sidebar')?.classList.remove('open'); document.getElementById('overlay')?.classList.remove('show'); }
        function initMobile() {
            const menuBtn = document.getElementById('menuToggleBtn');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');
            menuBtn?.addEventListener('click',()=>{ sidebar.classList.add('open'); overlay.classList.add('show'); });
            overlay?.addEventListener('click',closeMobileSidebar);
            window.addEventListener('resize',()=>{ if(window.innerWidth>860) closeMobileSidebar(); });
        }
        // 顶部搜索引擎
        function initSearch() {
            let curr='baidu';
            document.querySelectorAll('.engine-btn').forEach(btn=>{
                btn.addEventListener('click',()=>{
                    document.querySelectorAll('.engine-btn').forEach(b=>b.classList.remove('active'));
                    btn.classList.add('active');
                    curr=btn.getAttribute('data-engine');
                });
            });
            document.getElementById('searchBtn').addEventListener('click',()=>{
                let q=document.getElementById('searchInput').value.trim();
                if(!q){ alert('请输入关键词'); return; }
                let url='';
                if(curr==='baidu') url=`https://www.baidu.com/s?wd=${encodeURIComponent(q)}`;
                else if(curr==='google') url=`https://www.google.com/search?q=${encodeURIComponent(q)}`;
                else url=`https://www.bing.com/search?q=${encodeURIComponent(q)}`;
                window.open(url,'_blank');
            });
        }
        renderSidebar();
        renderContent();
        initScrollSpy();
        initMobile();
        initSearch();
    </script>
